name: latest-recipe-publish

on:
  push:
    branches:
      - latest-recipe
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-generate-publish:
    runs-on: ubuntu-latest
    env:
      DEBIAN_FRONTEND: noninteractive
      SBUILD_MIRROR: http://deb.debian.org/debian
      DEB_S3_BUCKET: ${{ vars.DEB_S3_BUCKET }}
      DEB_S3_PREFIX: ${{ vars.DEB_S3_PREFIX }}
      DEB_S3_CODENAME: ${{ vars.DEB_S3_CODENAME }}
      DEB_S3_COMPONENT: ${{ vars.DEB_S3_COMPONENT }}
      DEB_S3_REGION: ${{ vars.DEB_S3_REGION }}
      DEB_S3_ORIGIN: ${{ vars.DEB_S3_ORIGIN }}
      DEB_S3_SUITE: ${{ vars.DEB_S3_SUITE }}
      DEB_S3_PRESERVE_VERSIONS: ${{ vars.DEB_S3_PRESERVE_VERSIONS }}
      DEB_S3_LOCK: ${{ vars.DEB_S3_LOCK }}
      DEB_S3_FAIL_IF_EXISTS: ${{ vars.DEB_S3_FAIL_IF_EXISTS }}
      DEB_S3_VISIBILITY: ${{ vars.DEB_S3_VISIBILITY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install host tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            devscripts \
            git-buildpackage \
            mmdebstrap \
            pristine-tar \
            ruby \
            sbuild
          sudo gem install --no-document deb-s3

      - name: Enable user namespaces for unshare builds
        run: sudo sysctl -w kernel.unprivileged_userns_clone=1

      - name: Generate buildable source tree
        id: generate
        run: |
          ./ci/generate-gbp-repo.sh \
            --source-branch latest-recipe \
            --generated-branch latest \
            --workspace "${RUNNER_TEMP}/latest-generated" \
            --remote origin \
            --output-file "$GITHUB_OUTPUT"

      - name: Build source package
        id: source
        run: |
          ./ci/build-source-package.sh \
            --workspace "${{ steps.generate.outputs.workspace }}" \
            --output-file "$GITHUB_OUTPUT"

      - name: Build in sbuild
        id: sbuild
        run: |
          ./ci/run-sbuild.sh \
            --workspace "${{ steps.generate.outputs.workspace }}" \
            --dsc "${{ steps.source.outputs.dsc }}" \
            --artifact-dir "${RUNNER_TEMP}/artifacts" \
            --output-file "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: latest-recipe-${{ github.sha }}
          path: ${{ runner.temp }}/artifacts/
          if-no-files-found: error

      - name: Push generated branches and tags
        run: |
          ./ci/push-generated-gbp-refs.sh \
            --workspace "${{ steps.generate.outputs.workspace }}" \
            --generated-branch latest \
            --upstream-branch upstream/latest \
            --remote origin

      - name: Publish to deb-s3
        if: ${{ vars.DEB_S3_BUCKET != '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          ./ci/publish-deb-s3.sh \
            --artifact-dir "${{ steps.sbuild.outputs.artifact_dir }}"
