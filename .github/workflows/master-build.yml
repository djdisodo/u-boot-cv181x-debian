name: master-build

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEBIAN_FRONTEND: noninteractive
      SBUILD_MIRROR: http://deb.debian.org/debian
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install host tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            devscripts \
            git-buildpackage \
            mmdebstrap \
            pristine-tar \
            sbuild

      - name: Enable user namespaces for unshare builds
        run: |
          current_user="$(id -un)"
          alloc_subid() {
            local file="$1"
            awk -F: 'BEGIN { max = 100000 } NF >= 3 { end = $2 + $3; if (end > max) max = end } END { print max + 65536 }' "$file"
          }
          if ! getsubids "$current_user" >/dev/null 2>&1; then
            next_subuid="$(alloc_subid /etc/subuid)"
            echo "${current_user}:${next_subuid}:65536" | sudo tee -a /etc/subuid
          fi
          if ! getsubids -g "$current_user" >/dev/null 2>&1; then
            next_subgid="$(alloc_subid /etc/subgid)"
            echo "${current_user}:${next_subgid}:65536" | sudo tee -a /etc/subgid
          fi
          if [ -e /proc/sys/kernel/unprivileged_userns_clone ]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi

      - name: Generate buildable source tree
        id: generate
        run: |
          ./ci/generate-gbp-repo.sh \
            --source-branch master \
            --generated-branch ci/master-build \
            --workspace "${RUNNER_TEMP}/ci-master-build" \
            --remote origin \
            --output-file "$GITHUB_OUTPUT"

      - name: Build source package
        id: source
        run: |
          ./ci/build-source-package.sh \
            --workspace "${{ steps.generate.outputs.workspace }}" \
            --output-file "$GITHUB_OUTPUT"

      - name: Build in sbuild
        id: sbuild
        run: |
          ./ci/run-sbuild.sh \
            --workspace "${{ steps.generate.outputs.workspace }}" \
            --dsc "${{ steps.source.outputs.dsc }}" \
            --artifact-dir "${RUNNER_TEMP}/artifacts" \
            --output-file "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: master-${{ github.sha }}
          path: ${{ runner.temp }}/artifacts/
          if-no-files-found: error
